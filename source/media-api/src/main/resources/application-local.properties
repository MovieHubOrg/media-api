# SERVER
#server.servlet.context-path=/hq-qrcode-api
server.port = ${PORT}
spring.main.allow-bean-definition-overriding=true
#spring.jackson.serialization.INDENT_OUTPUT= true
#spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

#EXCEPTION HANDLER
server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.resources.add-mappings=false

#LOG
# logging.pattern.file= "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
logging.level.root=WARN
logging.level.vn.qrauth.us=DEBUG
logging.level.org.springframework.web=WARN
# logging.file.path=logs/
# logging.file.name=logs/qrcode-auth.log
#logging.file=${catalina.home}/logs/spam.log

# config size upload
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_FILE_SIZE}

spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.hibernate.ddl-auto=none

#APP CONFIG
auth.signing.key=${AUTH_SIGNING_KEY}

# Async Config
thread.pool.size=10
thread.pool.queue.size=150

#upload dir
file.upload-dir=${UPLOAD_DIR}

#ffmpeg config
ffmpeg.path=${FFMPEG_PATH}
ffprobe.path=${FFPROBE_PATH}

#cloudinary config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
#spring.rabbitmq.host=rabbitmq.moviehub.biz
#spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

rabbitmq.media.queue=MOVIE_QUEUE_MEDIA
rabbitmq.convert.video.queue=CONVERT_VIDEO_QUEUE
rabbitmq.update.video.queue=UPDATE_VIDEO_QUEUE
rabbitmq.app=MOVIE

# Minio
minio.endpoint=${MINIO_ENDPOINT}
minio.root.user=${MINIO_ROOT_USER}
minio.root.password=${MINIO_ROOT_PASSWORD}
minio.bucket=${MINIO_BUCKET}